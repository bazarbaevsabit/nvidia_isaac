name: Test Isaac Sim Project

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  validate-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pytest pytest-cov
          
      - name: Syntax check
        run: |
          python -m py_compile main.py
          
      - name: Check imports (without Isaac Sim)
        run: |
          # Создаем заглушки для Isaac Sim модулей
          python -c "
          import sys
          # Проверяем синтаксис без реального импорта Isaac Sim
          with open('main.py', 'r') as f:
              code = f.read()
          # Простая проверка структуры
          assert 'import numpy' in code
          assert 'SimulationApp' in code
          print('Code structure check passed')
          "

  docker-test:
    runs-on: [self-hosted, linux, gpu]  # Требуется self-hosted runner с GPU
    if: false  # По умолчанию отключено, включите при наличии GPU runner
    container:
      image: nvcr.io/nvidia/isaac-sim:2023.1.1
      options: --gpus all
    steps:
      - uses: actions/checkout@v4
      
      - name: Run simulation test
        run: |
          export PYTHONPATH="${PYTHONPATH}:/isaac-sim/kit/python/lib/python3.7/site-packages"
          # Запуск в headless режиме для CI
          python -c "
          from isaacsim import SimulationApp
          simulation_app = SimulationApp({'headless': True})
          # ... остальной код теста
          print('Simulation test completed successfully')
          simulation_app.close()
          "